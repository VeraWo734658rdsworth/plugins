<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Plugin Builder</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="summary-view" data-view="summary">
        <header class="hero">
          <div class="hero-copy">
            <p class="eyebrow">Plugin created</p>
            <div class="title-row">
              <div class="plugin-mark" aria-hidden="true"></div>
              <div>
                <h1 id="plugin-title">Loading plugin</h1>
                <p id="plugin-description" class="subtitle"></p>
              </div>
            </div>
          </div>
          <div class="hero-actions">
            <button id="view-plugin" class="quiet-button" type="button">View</button>
            <button id="share-plugin" class="primary-button" type="button">Share</button>
          </div>
        </header>

        <section class="content-section">
          <h2>Skills</h2>
          <div id="skills-list" class="resource-list"></div>
        </section>

        <section class="content-section">
          <h2>Apps</h2>
          <div id="apps-list" class="resource-list"></div>
        </section>

        <section class="content-section">
          <h2>MCP servers</h2>
          <div id="mcp-list" class="resource-list"></div>
        </section>

        <section class="content-section">
          <h2>Marketplaces</h2>
          <div id="marketplaces-list" class="meta-list"></div>
        </section>

        <section class="content-section">
          <h2>Local details</h2>
          <div id="local-details" class="meta-list"></div>
        </section>
      </section>

      <section class="detail-view" data-view="detail" hidden>
        <button id="back-button" class="back-button" type="button">
          Back to plugin summary
        </button>
        <div id="detail-content"></div>
      </section>
    </main>
    <script src="./app.js"></script>
  </body>
</html>
